<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传简历 - 智学优教</title>
    <style>
        body { background: #F5F7FA; margin: 0; font-family: Arial, Helvetica, sans-serif; }
        .navbar { width: 100vw; background: #F5F7FA; box-shadow: 0 2px 8px rgba(42,77,155,0.08); display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; height: 72px; z-index: 10; }
        .navbar-inner { width: 100%; max-width: 1100px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .navbar-title { font-size: 26px; color: #2A4D9B; font-weight: bold; letter-spacing: 2px; }
        .main-container { max-width: 600px; margin: 120px auto 0 auto; background: #fff; border-radius: 22px; box-shadow: 0 4px 16px rgba(42,77,155,0.10); padding: 48px 32px 40px 32px; }
        .upload-title { font-size: 24px; color: #2A4D9B; font-weight: bold; margin-bottom: 32px; }
        .upload-area { border: 2px dashed #BFD2F6; border-radius: 16px; background: #F5F7FA; padding: 36px 24px; text-align: center; margin-bottom: 24px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto; }
        .upload-area input[type="file"] { display: none; }
        .upload-btn { background: #2A4D9B; color: #fff; border: none; border-radius: 8px; padding: 12px 32px; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-bottom: 12px; }
        .upload-btn:hover { background: #1d3570; }
        .submit-btn { background: #FFD600; color: #2A4D9B; border: none; border-radius: 8px; padding: 12px 32px; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-bottom: 12px; }
        .submit-btn[disabled] { background: #FFF7D6; color: #aaa; cursor: not-allowed; }
        .file-name { color: #2A4D9B; font-size: 16px; margin-top: 8px; word-break: break-all; }
        .tip { color: #888; font-size: 14px; margin-bottom: 40px; }
        .resume-preview { margin-top: 32px; width: 100%; max-width: 400px; min-height: 200px; background: #F5F7FA; border-radius: 12px; box-shadow: 0 2px 8px rgba(42,77,155,0.08); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 12px; }
        .resume-preview object { width: 100%; height: 400px; border: none; }
        .resume-preview .word-tip { color: #2A4D9B; font-size: 16px; margin-top: 12px; }
        .back-link { display: block; margin-top: 24px; color: #2A4D9B; text-decoration: none; font-size: 18px; text-align: center; }
        .back-link:hover { color: #FFD600; }
        @media (max-width: 700px) {
            .main-container { padding: 0 4vw; }
            .upload-title { font-size: 18px; }
            .back-link { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-inner">
            <span class="navbar-title">智学优教——一站式服务平台</span>
        </div>
    </div>
    <div class="main-container">
        <div class="upload-title">上传简历</div>
        <div class="upload-area" id="uploadArea">
            <div class="tip">仅支持 PDF 或 Word 文件（.pdf, .doc, .docx）</div>
            <label class="upload-btn" for="resumeFile">选择文件</label>
            <input type="file" id="resumeFile" accept=".pdf,.doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
            <button class="submit-btn" id="submitBtn" disabled>上传</button>
            <div class="file-name" id="fileName"></div>
        </div>
        <div class="resume-preview" id="resumePreview" style="display:none;"></div>
        <a href="teacher_main.html" class="back-link">返回教师中心</a>
    </div>
    <script>
        // 获取当前登录教师信息
        function getCurrentTeacher() {
            return JSON.parse(localStorage.getItem('currentTeacher') || 'null');
        }
        // 文件选择与校验
        let uploadedFile = null;
        document.getElementById('resumeFile').addEventListener('change', function(e) {
            var file = e.target.files[0];
            var fileNameDiv = document.getElementById('fileName');
            var submitBtn = document.getElementById('submitBtn');
            var previewDiv = document.getElementById('resumePreview');
            previewDiv.style.display = 'none';
            previewDiv.innerHTML = '';
            if (!file) {
                fileNameDiv.textContent = '';
                submitBtn.disabled = true;
                uploadedFile = null;
                return;
            }
            var ext = file.name.split('.').pop().toLowerCase();
            if(['pdf','doc','docx'].indexOf(ext) === -1) {
                fileNameDiv.textContent = '';
                alert('仅支持上传PDF或Word文件！');
                e.target.value = '';
                submitBtn.disabled = true;
                uploadedFile = null;
                return;
            }
            fileNameDiv.textContent = '已选择文件：' + file.name;
            submitBtn.disabled = false;
            uploadedFile = file;
        });
        document.getElementById('submitBtn').addEventListener('click', function() {
            if (!uploadedFile) return;
            var teacher = getCurrentTeacher();
            if (!teacher) return;
            var resumeKey = `teacher_resume_${teacher.username || teacher.phone}`;
            var ext = uploadedFile.name.split('.').pop().toLowerCase();
            var reader = new FileReader();
            reader.onload = function(e) {
                // 保存简历数据
                localStorage.setItem(resumeKey, JSON.stringify({
                    name: uploadedFile.name,
                    ext: ext,
                    dataUrl: e.target.result,
                    uploadTime: new Date().toISOString()
                }));
                // 显示上传成功提示
                alert('简历上传成功！');
                // 更新预览
                showSavedResume();
            };
            reader.readAsDataURL(uploadedFile);
        });
        function showSavedResume() {
            var teacher = getCurrentTeacher();
            if (!teacher) return;
            var resumeKey = `teacher_resume_${teacher.username || teacher.phone}`;
            var previewDiv = document.getElementById('resumePreview');
            var saved = localStorage.getItem(resumeKey);
            
            if (!saved) {
                previewDiv.style.display = 'none';
                previewDiv.innerHTML = '';
                return;
            }

            var data = JSON.parse(saved);
            previewDiv.style.display = 'block';
            previewDiv.innerHTML = '';
            
            if (data.ext === 'pdf') {
                previewDiv.innerHTML = '<object data="' + data.dataUrl + '" type="application/pdf"></object>';
            } else {
                previewDiv.innerHTML = '<div class="word-tip">已上传Word文件：' + data.name + '<br>（浏览器不支持直接预览Word文档）</div>';
            }
        }
        // 页面加载时自动展示
        window.onload = function() {
            var teacher = getCurrentTeacher();
            if (!teacher) {
                window.location.href = 'index.html';
                return;
            }
            showSavedResume();
        };
    </script>
</body>
</html>
